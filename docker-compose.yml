# docker-compose.yml for mcp-trek
# MCP proxy — forwards Claude Code requests to TREK's native MCP endpoint
# Deploy: Portainer → Stacks → Add from Repository → GitOps polling
# CI/CD: GitHub Actions builds image on push, updates this tag automatically
#
# SECURITY: This file follows PAI hardened container policy.
# Do NOT add: docker.sock mounts, privileged mode, host network/PID,
# extra capabilities, or secrets in environment variables.

services:
  mcp-trek:
    image: ghcr.io/nsoult-agentic/mcp-trek:sha-df81491
    container_name: mcp-trek
    labels:
      - "diun.enable=false"  # our own CI/sha-built image; diun watches third-party only (brain #2538)
    restart: unless-stopped

    # ── Network ──
    ports:
      - "0.0.0.0:8911:8911"  # LAN accessible — shared with Lucy's Claude Desktop
    networks:
      - default
      - npm_network

    # ── Security Hardening ──
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # ── Resource Limits ──
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

    # ── Filesystem ──
    volumes:
      # Secrets — root-owned on host, read-only in container
      - /srv/mcp-trek/secrets:/secrets:ro
    tmpfs:
      - /tmp:size=32m,noexec,nosuid

    # ── Health Check ──
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:8911/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # ── Environment ──
    environment:
      - NODE_ENV=production
      - SECRETS_DIR=/secrets
      - PORT=8911
      - TREK_URL=http://trek:3000
      # OAuth 2.1 client_credentials (TREK v3.1.0+). CLIENT_ID is an identifier,
      # not a secret; the client secret is read from /secrets/$SECRET_FILE.
      - CLIENT_ID=854096ef-ea67-4157-aa6b-0f612408432c
      - SECRET_FILE=trek-oauth-secret-neil
      # Legacy fallback (ignored while CLIENT_ID is set) — remove CLIENT_ID to revert.
      - TOKEN_FILE=trek-token-neil
      # NEVER put secrets here — credentials are read from files under /secrets

  # ── Lucy's bridge instance (separate token, separate port) ──
  mcp-trek-lucy:
    image: ghcr.io/nsoult-agentic/mcp-trek:sha-df81491
    container_name: mcp-trek-lucy
    labels:
      - "diun.enable=false"  # our own CI/sha-built image; diun watches third-party only (brain #2538)
    restart: unless-stopped

    # ── Network ──
    ports:
      - "0.0.0.0:8916:8916"  # LAN accessible — Lucy's Claude Desktop
    networks:
      - default
      - npm_network

    # ── Security Hardening ──
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # ── Resource Limits ──
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

    # ── Filesystem ──
    volumes:
      - /srv/mcp-trek/secrets:/secrets:ro
    tmpfs:
      - /tmp:size=32m,noexec,nosuid

    # ── Health Check ──
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:8916/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # ── Environment ──
    environment:
      - NODE_ENV=production
      - SECRETS_DIR=/secrets
      - PORT=8916
      - TREK_URL=http://trek:3000
      # OAuth 2.1 client_credentials (TREK v3.1.0+). CLIENT_ID is an identifier,
      # not a secret; the client secret is read from /secrets/$SECRET_FILE.
      - CLIENT_ID=25038af7-d909-4986-baa9-02b41474d6a1
      - SECRET_FILE=trek-oauth-secret-lucy
      # Legacy fallback (ignored while CLIENT_ID is set) — remove CLIENT_ID to revert.
      - TOKEN_FILE=trek-token-lucy

networks:
  npm_network:
    external: true
